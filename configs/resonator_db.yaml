# Aether Core — Spektral Barkod Veritabanı (SpectralBarcodeDB)
# Kaynak: README.md → Modül 1 Adım 3 + Modül 4 Adım 4 + Tasarım Kararları
#
# Her ürün, S(f) Lorentzian formülüyle 7-bit Hamming codeword'a kodlanır:
#   S(f) = ∏_{i=1..7} [ 1 - A_i · 1 / (1 + Q_i² (f/f_i - f_i/f)²) ]
#
# Eşleştirme (çift yol):
#   1. identification_head 64-d L2-norm latent → cosine sim → ID lookup
#   2. identification_head 7-bit binary tahmin → Hamming(7,4) decode → 4-bit data → ID

# ── Şema (REVİZE 2026-05-14) ──────────────────────────────────
encoding:
  scheme: "hamming_7_4"           # tek-bit hata düzeltme
  data_bits: 4                    # 16 unique ID
  parity_bits: 3
  codeword_bits: 7                # spektrumdaki fiziksel çentik sayısı

# ── Rezonatör fiziksel tasarım ────────────────────────────────
resonator:
  # Ana tercih (jüri demosu için)
  primary_type: "3d_printed_dielectric_block"
  primary_material: "carbon_doped_pla"
  primary_epsilon_r_range: [4.0, 6.0]
  primary_q_factor_range: [100, 150]

  # Yedek tercih (Q sınırda)
  fallback_type: "passive_metal_strip"
  fallback_q_factor_range: [40, 60]

  # Spektrum yerleşimi (UWB BW = 500 MHz, merkez ~6.5 GHz)
  spectrum_bandwidth_hz: 500.0e+6
  spectrum_center_hz: 6.5e+9
  notch_band_hz: 71.0e+6             # 500 MHz / 7 codeword bits
  min_required_q: 91              # f_0 / notch_band

# ── Ürün katalogu (16 ürün, 4-bit ID 0-15) ────────────────────
# C Paketi 2026-06-03: Bitirme jüri demosu için sınıf ortamına uygun
# basit ürün senaryosu. Codeword field'ı runtime'da Hamming(7,4) ile
# data_bits'ten üretilir (backend/product_db.py). Burada sadece
# kullanıcıya görünen alanlar (material/name/color/description).
#
# material: 4-sınıf (metal/plastik/ahşap/karton) — recognition head
#           ile çift doğrulama için kullanılır
# color_hex: dashboard voxel renderer (DB'den, model rec'ten değil)
# id: 0-15 arası unique, data_bits = id'nin 4-bit binary'si

products:
  # ── Metal ürünler (ID 0-3) ──
  - {id: 0,  data_bits: [0,0,0,0], material: "metal",   name: "Alüminyum kupa",       color_hex: "#C0C0C0", description: "200ml ince cidarlı"}
  - {id: 1,  data_bits: [0,0,0,1], material: "metal",   name: "Çelik anahtarlık",     color_hex: "#808080", description: "Halka + 3 anahtar"}
  - {id: 2,  data_bits: [0,0,1,0], material: "metal",   name: "Bakır madeni para",    color_hex: "#B87333", description: "5 TL'lik"}
  - {id: 3,  data_bits: [0,0,1,1], material: "metal",   name: "Pirinç çıngırak",      color_hex: "#B5A642", description: "Küçük zil"}

  # ── Plastik ürünler (ID 4-7) ──
  - {id: 4,  data_bits: [0,1,0,0], material: "plastik", name: "Plastik su şişesi",    color_hex: "#3498DB", description: "500ml PET boş"}
  - {id: 5,  data_bits: [0,1,0,1], material: "plastik", name: "Plastik oyuncak küp",  color_hex: "#E74C3C", description: "5×5 cm renkli"}
  - {id: 6,  data_bits: [0,1,1,0], material: "plastik", name: "Plastik kalemlik",     color_hex: "#9B59B6", description: "Silindir form"}
  - {id: 7,  data_bits: [0,1,1,1], material: "plastik", name: "Plastik kart tutucu",  color_hex: "#1ABC9C", description: "ID kart için"}

  # ── Ahşap ürünler (ID 8-11) ──
  - {id: 8,  data_bits: [1,0,0,0], material: "ahşap",   name: "Tahta blok",           color_hex: "#8B4513", description: "10×5×3 cm masif"}
  - {id: 9,  data_bits: [1,0,0,1], material: "ahşap",   name: "Tahta kaşık",          color_hex: "#A0522D", description: "Mutfak ölçeği"}
  - {id: 10, data_bits: [1,0,1,0], material: "ahşap",   name: "Tahta bardak altlığı", color_hex: "#CD853F", description: "Yuvarlak çap 10 cm"}
  - {id: 11, data_bits: [1,0,1,1], material: "ahşap",   name: "Kalem (HB)",           color_hex: "#DEB887", description: "Standart kurşun"}

  # ── Karton ürünler (ID 12-15) ──
