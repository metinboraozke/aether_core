# Material sınıf renkleri (DB'de tanımlı tek tip materyalin generik rengi —
# eğer ID bilinmiyorsa veya match yoksa fallback için):
material_palette:
  metal:    "#999999"
  plastik:  "#3498DB"
  ahşap:    "#8B4513"
  karton:   "#F5DEB3"
  unknown:  "#404040"
