# Aether Core — Sahne (Scene) konfigürasyonu — PRESET: classroom_default
# REVİZE 2026-05-15: HİBRİT TOPOLOJİ (4 master + 4 satellite = 8 fiziksel düğüm)
# UWB Round-Robin TDMA: 4 master kit, 40 ms cycle (25 Hz), C(4,2)=6 bistatic link

domain:
  name: "classroom_default"
  description: "Standart sınıf ortamı, mevcut baseline"
  master_seed: 42

room:
  width_m: 10.0      # X
  depth_m: 5.0       # Y
  height_m: 3.0      # Z

shelf:
  n_slots: 6
  grid: [3, 2]
  center_xyz_m: [5.0, 2.5, 1.5]
  size_xyz_m: [1.0, 0.4, 1.0]
  slot_size_m: [0.5, 0.4, 0.33]

slot_centers_m:
  - [4.75, 2.5, 1.83]
  - [5.25, 2.5, 1.83]
  - [4.75, 2.5, 1.50]
  - [5.25, 2.5, 1.50]
  - [4.75, 2.5, 1.17]
  - [5.25, 2.5, 1.17]

# ── HİBRİT NODE TOPOLOJİSİ ────────────────────────────────────
# 8 fiziksel düğüm:
#   4 master   = ESP32 + UWB tek noktada (yan yana PCB'ler)
#   4 satellite = sadece ESP32
# WiFi link = C(8,2) = 28
# UWB link  = C(4,2) = 6 bistatic (round-robin TDMA içinde)
nodes:
  - {id: "M1", type: "master",    position_m: [4.6, 2.5, 2.95], sensors: ["esp32", "uwb"]}
  - {id: "M2", type: "master",    position_m: [5.4, 2.5, 2.95], sensors: ["esp32", "uwb"]}
  - {id: "M3", type: "master",    position_m: [0.5, 0.5, 2.70], sensors: ["esp32", "uwb"]}
  - {id: "M4", type: "master",    position_m: [5.0, 2.5, 2.30], sensors: ["esp32", "uwb"]}
  - {id: "S1", type: "satellite", position_m: [0.5, 0.5, 0.8],  sensors: ["esp32"]}
  - {id: "S2", type: "satellite", position_m: [9.5, 0.5, 0.8],  sensors: ["esp32"]}
  - {id: "S3", type: "satellite", position_m: [0.5, 4.5, 0.8],  sensors: ["esp32"]}
  - {id: "S4", type: "satellite", position_m: [9.5, 4.5, 0.8],  sensors: ["esp32"]}

# ── WiFi (Channel 1, HT40) ────────────────────────────────────
wifi:
  freq_hz: 2.412e+9
  bandwidth_hz: 40.0e+6
  n_subcarriers: 108
  # ESP32 düğümleri = nodes listesinden sensors içinde "esp32" olanlar (8 adet)

# ── UWB (DW1000/DW3000 tipi, bistatic round-robin TDMA) ─────────
uwb:
  freq_hz: 6.5e+9           # UWB merkez frekansı
  bandwidth_hz: 500.0e+6
  n_taps: 32
  tap_dt_ns: 2.0
  window_ns: 64.0
  # TDMA çevirimi
  tdma_cycle_ms: 40.0      # 25 Hz tam tarama
  tdma_slot_ms: 10.0       # her master 10 ms TX
  # 4 master arasında C(4,2)=6 unique bistatic link (simetri reciprocity)

# ── Malzemeler ────────────────────────────────────────────────
materials:
  walls_concrete:
    iturm: "concrete"
    epsilon_r_range: [5.0, 7.0]
    scattering: "lambertian"
  shelf_metal:
    iturm: "metal"
    pec: true
    scattering: "specular"
  object_metal: { iturm: "metal" }
  object_plastic: { epsilon_r_range: [2.5, 3.5] }
  object_wood: { epsilon_r_range: [2.0, 3.0] }
  object_cardboard: { epsilon_r_range: [1.5, 2.0] }
  resonator_pla_carbon:
    epsilon_r_range: [4.0, 6.0]
    q_factor_range: [100, 150]
    block_size_mm: [40, 40, 10]

# ── Stochasticity ─────────────────────────────────────────────
randomization:
  slot_position_jitter_mm: 5.0
  slot_rotation_jitter_deg: 15.0
  slot_fill_probability: 0.6
  noise:
    cfo_phase_max_rad: 3.14159
    agc_gain_db_range: [-6.0, 6.0]
    wifi_interferer_count_max: 3
    bt_burst_dropout_prob: 0.05
